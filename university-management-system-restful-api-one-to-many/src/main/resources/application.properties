spring.application.name=university-management-system-restful-api
# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=8081

# ===================================
# APPLICATION INFO
# ===================================
spring.profiles.active=dev

# ===================================
# DATABASE CONFIGURATION (MySQL)
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/university_management_system_2
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================================
# SPRING DATA REST (Core Config)
# ===================================
# Base path for all REST repository endpoints
spring.data.rest.base-path=/api